name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hostel_db
          MYSQL_USER: hostel_user
          MYSQL_PASSWORD: hostel_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up!"; break;
            fi
            echo "Waiting for MySQL..."; sleep 2;
          done

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS hostel_db; GRANT ALL PRIVILEGES ON hostel_db.* TO 'hostel_user'@'%' IDENTIFIED BY 'hostel_password'; FLUSH PRIVILEGES;"

      - name: Make mvnw executable
        run: chmod +x backend/app/mvnw

      - name: Install backend dependencies and build
        working-directory: ./backend/app
        run: ./mvnw clean package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/hostel_db
          SPRING_DATASOURCE_USERNAME: hostel_user
          SPRING_DATASOURCE_PASSWORD: hostel_password
          SPRING_JPA_HIBERNATE_DDL_AUTO: create

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run frontend linter
        working-directory: ./frontend
        run: npm run lint 2>/dev/null || echo "Linter not configured, skipping"
        continue-on-error: true