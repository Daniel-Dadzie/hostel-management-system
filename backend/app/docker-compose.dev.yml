# Development docker-compose with auto-refresh / hot reloading
# Usage: docker compose -f docker-compose.dev.yml up --build

services:

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: hostel-mysql-dev
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hostel_db
      MYSQL_USER: hostel_user
      MYSQL_PASSWORD: hostelpass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/create-database.sql:/docker-entrypoint-initdb.d/02-create-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: hostel-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Spring Boot Backend (Hot Reload with DevTools) ───────────────────────
  backend:
    image: maven:3.9.11-eclipse-temurin-21
    container_name: hostel-backend-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5005:5005"
    working_dir: /app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/hostel_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: hostel_user
      DB_PASSWORD: hostelpass
      CACHE_TYPE: none
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: dev-secret-key-change-in-production-min-32-chars
    command: >
      /bin/sh -c "apt-get update && apt-get install -y curl > /dev/null 2>&1 && mvn spring-boot:run -Dspring-boot.run.jvmArguments=\"-Dspring.devtools.restart.enabled=true -Dspring.devtools.livereload.enabled=true\""
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -o /dev/null http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      # Spring Boot first startup in containers can take several minutes.
      start_period: 240s
      retries: 30

  # ─── React Frontend (Development with Vite HMR) ───────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: hostel-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_PORT: "3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  mysql_data:
  redis_data:
  maven_cache:
  frontend_node_modules:
