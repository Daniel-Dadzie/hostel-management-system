server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: hostel-management-system

  # Spring Boot DevTools configuration for hot reload
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholder-replacement: true
    placeholders:
      # IMPORTANT: Set ADMIN_PASSWORD_HASH environment variable before first run!
      # Generate with: java -cp target/classes -e "new BCryptPasswordEncoder().encode(\"your-password\")"
      # Or use online: https://bcrypt-generator.com/ (rounds=10)
      # Default below is a random UUID hashed - check startup logs for the generated password
      adminPasswordHash: ${ADMIN_PASSWORD_HASH:}

  # ── Redis cache ──────────────────────────────────────────────────────────
  # Set CACHE_TYPE=none to disable caching (useful in tests / local dev without Redis).
  # Per-cache TTLs are configured in CacheConfig.java.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: ${CACHE_TYPE:redis}

  # ── Email (SMTP) ─────────────────────────────────────────────────────────
  # Leave MAIL_HOST unset to run without sending emails (logs to console instead).
  # Example for Gmail: MAIL_HOST=smtp.gmail.com, MAIL_USERNAME=you@gmail.com,
  #   MAIL_PASSWORD=<app-password>
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

# ── Spring Boot Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    "[org.hibernate.SQL]": INFO

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  upload:
    root-dir: ${UPLOAD_ROOT_DIR:uploads}
    max-image-bytes: ${UPLOAD_MAX_IMAGE_BYTES:5242880}

  auth:
    # Forgot-password rate limit window in seconds.
    # Uses Redis when available and falls back to in-memory per-instance limiter.
    reset-rate-limit-seconds: ${RESET_RATE_LIMIT_SECONDS:60}
    # Cleanup interval for expired password-reset tokens (default: 1 hour).
    reset-token-cleanup-ms: ${RESET_TOKEN_CLEANUP_MS:3600000}

  jwt:
    # REQUIRED: JWT secret must be provided via environment variable.
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

  booking:
    payment-hold-minutes: ${BOOKING_PAYMENT_HOLD_MINUTES:30}
    expiration-cron-ms: ${BOOKING_EXPIRATION_FIXED_DELAY_MS:300000}

  academic:
    # Month number when a new academic year starts (1-12).
    year-start-month: ${ACADEMIC_YEAR_START_MONTH:9}
    # Academic session label stamped onto new booking applications.
    current-session: ${ACADEMIC_CURRENT_SESSION:REGULAR}
    # Reapplication window in MM-dd format.
    reapplication-window-start: ${ACADEMIC_REAPPLICATION_WINDOW_START:08-01}
    reapplication-window-end: ${ACADEMIC_REAPPLICATION_WINDOW_END:11-30}
    # Time zone used for academic year and reapplication window checks.
    time-zone: ${ACADEMIC_TIME_ZONE:Africa/Lagos}
    # Automatic yearly rollover run time (default: Aug 1st, 2:00 AM).
    rollover-cron: ${ACADEMIC_ROLLOVER_CRON:0 0 2 1 8 *}

  payments:
    paystack:
      base-url: ${PAYSTACK_BASE_URL:https://api.paystack.co}
      secret-key: ${PAYSTACK_SECRET_KEY:}
      callback-url: ${PAYSTACK_CALLBACK_URL:http://localhost:3000}
      webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:}
