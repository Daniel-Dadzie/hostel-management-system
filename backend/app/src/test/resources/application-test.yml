spring:
  datasource:
    url: jdbc:h2:mem:hms_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  cache:
    type: none

app:
  jwt:
    secret: test-jwt-secret-at-least-32-characters-long
  auth:
    reset-rate-limit-seconds: 1
  frontend-url: http://localhost:5173
